# Render.com tek tık dağıtımı (Blueprint) — ücretsiz plan
services:
  - type: web
    name: paperforge
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_PASSWORD          # siteyi parolayla korur (boş bırakmayın!)
        sync: false
      - key: GEMINI_API_KEY        # ücretsiz anahtar: https://aistudio.google.com/apikey
        sync: false
