# =============================================================================
# Pediatrik Gastroenteroloji — Literatür Temelli Algoritma Projesi
# BAŞLIK TASLAĞI (Taxonomy / Kapsam Tanımı)  —  v4
# =============================================================================
#
# DURUM: ONAYLANDI — v4 başlık listesi kullanıcı tarafından onaylandı.
#        İçerik üretimi başladı (bkz. data/entries/).
#
# Bu taslak güncel pediatrik GE KONSENSÜS REHBERLERİNE dayanır; yüklenen
# referans uygulamadan BAĞIMSIZ hazırlanmıştır. Rehber künyeleri PubMed
# üzerinden doğrulanmıştır (bkz. key_consensus_sources).
#
# v4 HEDEFİ: Bir çocuk gastroenteroloji polikliniğine gelebilecek TÜM
# şikayet/bulgu giriş noktalarını kapsamak (semptom + lab + görüntüleme +
# tüp/stoma + takip + acil). Bu yüzden BULGU/ŞİKAYET ekseni ağırlıklıdır.
#
# İKİ EKSENLİ YAPI:
#   presentations[]  → BULGU / ŞİKAYET temelli: "hasta ... ile geliyor"
#   conditions[]     → HASTALIK / DURUM temelli: tanımlı tanı → yönetim
#   (İki eksen arasında bilinçli örtüşme vardır: aynı konu hem "şikayetle
#    gelen hastaya tanısal yaklaşım" hem de "tanı konmuş hastada yönetim"
#    olarak ayrı algoritma alır.)
#
# Her grup: consensus[] = yöneten doğrulanmış rehber(ler); algorithms[] = başlıklar
#
# NASIL DÜZENLENİR:
#   - İstemediğin algoritmayı sil; başlığı değiştir; yeni başlık ekle (id benzersiz)
#   - Grupları/eksenleri yeniden düzenle; eksik rehberi key_consensus_sources'a ekle
#
# TASLAK TOPLAMI: 308 algoritma
#   • Bulgu/şikayet temelli: 17 grup / 205 algoritma
#   • Hastalık temelli:      13 grup / 103 algoritma
# =============================================================================

project: "Pediatrik GE — Literatür Temelli Algoritmalar"
schema_version: 4
status: onaylandi

