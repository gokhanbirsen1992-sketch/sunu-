# --- Klinik alanlar ve algoritmalar ------------------------------------------
domains:

  - id: fgid
    name: "Fonksiyonel GİS Bozuklukları (Rome IV)"
    icon: "〰️"
    consensus: [rome4_infant, rome4_child, constipation_2014]
    algorithms:
      - id: fgid_01
        title: "İnfant regürjitasyonu: GÖR / GÖRH ayrımı ve adımlı yönetim"
      - id: fgid_02
        title: "İnfant koliği: Rome IV tanısı ve aile danışmanlığı"
      - id: fgid_03
        title: "Fonksiyonel kabızlık: tanı + disempaksiyon + idame tedavisi"
      - id: fgid_04
        title: "Fonksiyonel karın ağrısı bozuklukları (FAP / IBS / abdominal migren) ayrımı"
      - id: fgid_05
        title: "Fonksiyonel dispepsi: Rome IV tanı ve yönetim"
      - id: fgid_06
        title: "Siklik kusma sendromu: atak ve profilaksi yönetimi"
      - id: fgid_07
        title: "Ruminasyon ve aerofaji: tanı ve yaklaşım"

  - id: ozofagus
    name: "Özofagus & Yutma"
    icon: "🫒"
    consensus: [gerd_2018, eoe_espghan, eoe_ueg, battery_2021, eatef]
    algorithms:
      - id: ozo_01
        title: "GÖRH (infant): kırmızı bayraklar ve adımlı yaklaşım"
      - id: ozo_02
        title: "GÖRH (çocuk / adölesan): tanı, PPI ve cerrahi karar"
      - id: ozo_03
        title: "Disfaji: yaşa göre ayırıcı tanı ve tanısal akış"
      - id: ozo_04
        title: "Eozinofilik özofajit: tanı ve tedavi (PPI / topikal steroid / diyet)"
      - id: ozo_05
        title: "Yabancı cisim yutma: yönetim algoritması"
      - id: ozo_06
        title: "Düğme pil yutma: acil yönetim"
      - id: ozo_07
        title: "Koroziv madde alımı: akut yaklaşım ve endoskopi zamanlaması"
      - id: ozo_08
        title: "Akalazya: tanı ve tedavi seçenekleri"
      - id: ozo_09
        title: "Özofagus atrezisi / TÖF: GİS ve beslenme komplikasyon takibi"

  - id: mide_duodenum
    name: "Mide–Duodenum & Üst GİS Kanama"
    icon: "🫃"
    consensus: [hpylori_2023, rome4_child]
    algorithms:
      - id: mid_01
        title: "Helicobacter pylori: test endikasyonu ve eradikasyon"
      - id: mid_02
        title: "Peptik ülser hastalığı: tanı ve tedavi"
      - id: mid_03
        title: "Üst GİS kanama (hematemez / melena): stabilizasyon ve endoskopi"
      - id: mid_04
        title: "Özofagus varis kanaması: akut yönetim ve profilaksi"
      - id: mid_05
        title: "Hipertrofik pilor stenozu: tanı ve yönetim"
      - id: mid_06
        title: "Safralı kusma (yenidoğan): malrotasyon / obstrüksiyon ayırıcısı"

  - id: ishal_malabs
    name: "Akut & Kronik İshal, Malabsorpsiyon"
    icon: "💧"
    consensus: [age_espghan, celiac_2020]
    algorithms:
      - id: ish_01
        title: "Akut gastroenterit ve dehidratasyon: değerlendirme + ORS + tedavi"
      - id: ish_02
        title: "Kanlı ishal (dizanteri): ayırıcı tanı ve HÜS değerlendirmesi"
      - id: ish_03
        title: "Kronik ishal (>4 hafta): yaşa göre tanısal akış"
      - id: ish_04
        title: "Çölyak hastalığı: tanı (biyopsisiz yol dahil)"
      - id: ish_05
        title: "Laktoz / karbonhidrat malabsorpsiyonu: yaklaşım"
      - id: ish_06
        title: "Yağlı dışkı / steatore: pankreatik ve mukozal ayrım"

  - id: besin_alerji
    name: "Besin Alerjileri & Eozinofilik Hastalıklar"
    icon: "🧬"
    consensus: [dracma]
    algorithms:
      - id: ala_01
        title: "İnek sütü protein alerjisi (IgE / non-IgE): tanı, eliminasyon, reintrodüksiyon"
      - id: ala_02
        title: "FPIES: akut atak yönetimi ve uzun dönem izlem"
      - id: ala_03
        title: "FPIAP (alerjik proktokolit): kanlı dışkılı sağlıklı infant yaklaşımı"
      - id: ala_04
        title: "Eozinofilik gastrit / enterit / kolit: tanı ve yönetim"

  - id: ibd
    name: "İnflamatuar Barsak Hastalığı (IBD)"
    icon: "🔵"
    consensus: [ibd_porto, cd_eccoespghan, uc_eccoespghan_1, uc_eccoespghan_2]
    algorithms:
      - id: ibd_01
        title: "Pediatrik IBD tanısı: revize Porto kriterleri ile tanısal akış"
      - id: ibd_02
        title: "Crohn hastalığı indüksiyon: EEN / steroid kararı"
      - id: ibd_03
        title: "Crohn hastalığı idame ve risk tabakalandırma (top-down / anti-TNF)"
      - id: ibd_04
        title: "Ülseratif kolit (ayaktan): adımlı tedavi"
      - id: ibd_05
        title: "Akut şiddetli ülseratif kolit (ASUC): PUCAI ≥65 yönetimi"
      - id: ibd_06
        title: "Perianal Crohn hastalığı: değerlendirme ve yönetim"
      - id: ibd_07
        title: "VEO-IBD (<6 yaş): monogenik hastalık tarama yaklaşımı"
      - id: ibd_08
        title: "Treat-to-target izlem: STRIDE-II + kalprotektin + ilaç düzeyi"

  - id: altgis_akut
    name: "Alt GİS Kanama & Akut Karın"
    icon: "🩸"
    consensus: []
    algorithms:
      - id: alt_01
        title: "Hematokezya: yaşa göre ayırıcı tanı ve tanısal akış"
      - id: alt_02
        title: "İnvajinasyon: tanı ve redüksiyon yönetimi"
      - id: alt_03
        title: "Meckel divertikülü: şüphe ve tanı"
      - id: alt_04
        title: "Akut karın / apandisit ayırıcısı: değerlendirme akışı"
      - id: alt_05
        title: "Hirschsprung hastalığı: tanı ve yönetim"
      - id: alt_06
        title: "Yenidoğan alt GİS obstrüksiyonu / NEC şüphesi: yaklaşım"

  - id: neonatal_kolestaz
    name: "Neonatal Kolestaz & Safra Yolları"
    icon: "👶"
    consensus: [cholestasis_2017, cholestasis_fispghan]
    algorithms:
      - id: kol_01
        title: "Uzamış yenidoğan sarılığı: 14. günde konjuge bilirubin değerlendirmesi"
      - id: kol_02
        title: "Neonatal kolestaz: tanısal akış"
      - id: kol_03
        title: "Biliyer atrezi: erken tanı ve Kasai zamanlaması"
      - id: kol_04
        title: "Koledok kisti: tanı ve yönetim"
      - id: kol_05
        title: "Akolik dışkı: değerlendirme yaklaşımı"

  - id: karaciger
    name: "Karaciğer Hastalıkları & Yetmezlik"
    icon: "🟫"
    consensus: [palf_naspghan]
    algorithms:
      - id: kc_01
        title: "İzole transaminaz yüksekliği: tanısal akış"
      - id: kc_02
        title: "Akut viral hepatit: değerlendirme ve izlem"
      - id: kc_03
        title: "Otoimmün hepatit: tanı ve tedavi"
      - id: kc_04
        title: "Wilson hastalığı: tanı ve tedavi"
      - id: kc_05
        title: "Pediatrik akut karaciğer yetmezliği (PALF): tanı, yönetim, nakil kararı"
      - id: kc_06
        title: "NAFLD / MASLD: obez çocukta ALT yüksekliğine yaklaşım"
      - id: kc_07
        title: "Portal hipertansiyon: tarama ve varis yönetimi"
      - id: kc_08
        title: "Hepatomegali / hepatosplenomegali: ayırıcı tanı"

  - id: pankreas
    name: "Pankreas Hastalıkları"
    icon: "🟡"
    consensus: [pancreatitis_naspghan]
    algorithms:
      - id: pan_01
        title: "Akut pankreatit: tanı ve yönetim"
      - id: pan_02
        title: "Akut rekürren / kronik pankreatit: etiyolojik değerlendirme"
      - id: pan_03
        title: "Ekzokrin pankreas yetmezliği: tanı ve enzim replasmanı"

  - id: beslenme
    name: "Beslenme & İntestinal Yetmezlik"
    icon: "🥗"
    consensus: [sbs_espghan]
    algorithms:
      - id: bes_01
        title: "Büyüme geriliği (faltering growth / FTT): değerlendirme ve yaklaşım"
      - id: bes_02
        title: "Kısa barsak sendromu / intestinal yetmezlik: rehabilitasyon"
      - id: bes_03
        title: "Enteral beslenme ve tüp seçimi: endikasyon ve yönetim"
      - id: bes_04
        title: "Parenteral nütrisyon ve IFALD: önleme ve yönetim"
      - id: bes_05
        title: "Refeeding sendromu: risk değerlendirmesi ve önleme"
      - id: bes_06
        title: "Mikronütrient eksiklikleri (demir / D vit / B12 / çinko): GİS bağlamı"
