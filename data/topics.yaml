    icon: "🍽️"
    consensus: [sbs_espghan, dracma]
    algorithms:
      - id: be_01
        title: "Yetersiz kilo alımı (infant): değerlendirme"
      - id: be_02
        title: "Büyüme geriliği / FTT: GİS odaklı değerlendirme"
      - id: be_03
        title: "Kilo kaybı (çocuk / adölesan): ayırıcı"
      - id: be_04
        title: "Kilo platosu / yavaş kilo artışı: değerlendirme"
      - id: be_05
        title: "İştahsızlık (anoreksi): ayırıcı"
      - id: be_06
