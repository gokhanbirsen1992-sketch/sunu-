# =============================================================================
# Pediatrik Gastroenteroloji — Literatür Temelli Algoritma Projesi
# BAŞLIK TASLAĞI (Taxonomy / Kapsam Tanımı)  —  v3
# =============================================================================
#
# DURUM: TASLAK — kullanıcı onayı / düzeltmesi bekleniyor.
#
# Bu taslak güncel pediatrik GE KONSENSÜS REHBERLERİNE dayanır; yüklenen
# referans uygulamadan BAĞIMSIZ hazırlanmıştır. Rehber künyeleri PubMed
# üzerinden doğrulanmıştır (bkz. key_consensus_sources).
#
# İKİ EKSENLİ YAPI:
#   presentations[]  → BULGU / ŞİKAYET temelli: "hasta ... ile geliyor"
#                      (lab anormalliği, görüntü bulgusu, semptom, acil) → tanısal algoritma
#   conditions[]     → HASTALIK / DURUM temelli: tanımlı tanı → yönetim algoritması
#
# Her grup:
#   consensus[]   → o grubu yöneten doğrulanmış konsensüs rehber(ler)i
#   algorithms[]  → üretilecek karar/yönetim algoritmaları (her biri ileride
#                   kendi PubMed'e çözümlenmiş kaynak listesini alacak)
#
# NASIL DÜZENLENİR:
#   - İstemediğin algoritmayı sil; başlığı değiştir; yeni başlık ekle (id benzersiz)
#   - Grupları/eksenleri serbestçe yeniden düzenle
#   - Eksik konsensüs rehberini key_consensus_sources'a ekle
#
# TASLAK TOPLAMI: 184 algoritma
#   • Bulgu/şikayet temelli: 4 grup / 81 algoritma
#   • Hastalık temelli:      13 grup / 103 algoritma
# =============================================================================

project: "Pediatrik GE — Literatür Temelli Algoritmalar"
schema_version: 3
status: taslak

