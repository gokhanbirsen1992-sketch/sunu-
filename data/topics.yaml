# =============================================================================
# EKSEN 2 — HASTALIK / DURUM TEMELLİ ALGORİTMALAR
# Tanımlı tanı → yönetim algoritması
# =============================================================================
conditions:

  - id: cond_ozofagus
    name: "Özofagus & Yutma"
    icon: "🫒"
    consensus: [gerd_2018, eoe_espghan, eoe_ueg, eatef]
    algorithms:
      - id: ozo_01
        title: "GÖRH (infant): tanı ve adımlı yönetim"
      - id: ozo_02
        title: "GÖRH (çocuk / adölesan): tanı, tedavi, cerrahi karar"
      - id: ozo_03
        title: "Eozinofilik özofajit: tanı ve tedavi"
      - id: ozo_04
        title: "Akalazya: tanı ve tedavi seçenekleri"
      - id: ozo_05
        title: "Enfeksiyöz özofajit (Candida / HSV / CMV)"
      - id: ozo_06
        title: "Özofageal striktür (peptik / koroziv / anastomotik)"
      - id: ozo_07
        title: "Özofagus atrezisi / TÖF: GİS ve beslenme komplikasyon takibi"
      - id: ozo_08
        title: "Özofageal motilite bozuklukları: değerlendirme"

  - id: cond_mide
    name: "Mide & Duodenum"
    icon: "🫃"
    consensus: [hpylori_2023, rome4_child]
    algorithms:
      - id: mid_01
        title: "Helicobacter pylori enfeksiyonu: tanı ve eradikasyon"
      - id: mid_02
        title: "Peptik ülser hastalığı: tanı ve tedavi"
      - id: mid_03
        title: "Gastrit (non-H. pylori): ayırıcı ve yönetim"
      - id: mid_04
        title: "Hipertrofik pilor stenozu: tanı ve yönetim"
      - id: mid_05
        title: "Fonksiyonel dispepsi (Rome IV): tanı ve yönetim"
      - id: mid_06
        title: "Gastroparezi: tanı ve yönetim"
      - id: mid_07
        title: "Üst GİS kanama: değerlendirme ve endoskopi"

  - id: cond_ibd
    name: "İnflamatuar Barsak Hastalığı (IBD)"
    icon: "🔵"
    consensus: [ibd_porto, cd_eccoespghan, uc_eccoespghan_1, uc_eccoespghan_2]
    algorithms:
      - id: ibd_01
        title: "Pediatrik IBD tanısı: revize Porto kriterleri ile tanısal akış"
      - id: ibd_02
        title: "Crohn hastalığı: indüksiyon (EEN / steroid kararı)"
      - id: ibd_03
        title: "Crohn hastalığı: idame ve risk tabakalandırma"
      - id: ibd_04
        title: "Ülseratif kolit: ayaktan adımlı tedavi"
      - id: ibd_05
        title: "Akut şiddetli ülseratif kolit (ASUC): PUCAI ≥65 yönetimi"
      - id: ibd_06
        title: "Perianal Crohn hastalığı: değerlendirme ve yönetim"
      - id: ibd_07
        title: "VEO-IBD (<6 yaş): monogenik hastalık tarama yaklaşımı"
      - id: ibd_08
        title: "Treat-to-target izlem: STRIDE-II + kalprotektin + ilaç düzeyi"
      - id: ibd_09
        title: "IBD'de biyolojik tedavi seçimi ve yanıt kaybı"
      - id: ibd_10
        title: "IBD komplikasyonları: darlık / fistül / abse yönetimi"

  - id: cond_enfeksiyoz
    name: "Enfeksiyöz & İnflamatuar Enterokolit"
    icon: "🦠"
    consensus: [age_espghan]
    algorithms:
      - id: enf_01
        title: "Akut viral gastroenterit: yönetim"
      - id: enf_02
        title: "Bakteriyel enterokolit (Salmonella / Shigella / Campylobacter / Yersinia)"
      - id: enf_03
        title: "EHEC / STEC + Hemolitik Üremik Sendrom: tanıma ve yönetim"
      - id: enf_04
        title: "Clostridioides difficile enfeksiyonu: tanı ve tedavi"
      - id: enf_05
        title: "Giardiyaz: tanı ve tedavi"
      - id: enf_06
        title: "İntestinal parazitozlar (Ascaris, oksiyür, Strongyloides)"
      - id: enf_07
        title: "Mikroskobik kolit: tanı ve yönetim"

  - id: cond_alerji
    name: "Besin Alerjisi & Eozinofilik GİS Hastalıkları"
    icon: "🧬"
    consensus: [dracma]
    algorithms:
      - id: ala_01
        title: "İnek sütü protein alerjisi — IgE aracılı: tanı ve yönetim"
      - id: ala_02
        title: "İnek sütü protein alerjisi — non-IgE aracılı: tanı ve yönetim"
      - id: ala_03
        title: "FPIES: akut atak ve uzun dönem yönetim"
      - id: ala_04
        title: "FPIAP (alerjik proktokolit): kanlı dışkılı sağlıklı infant"
      - id: ala_05
        title: "FPE (besin proteini ilişkili enteropati): yaklaşım"
      - id: ala_06
        title: "Eozinofilik gastrit / enterit / kolit: tanı ve yönetim"

  - id: cond_malabs
    name: "Malabsorpsiyon & Çölyak"
    icon: "🌀"
    consensus: [celiac_2020, sbs_espghan]
    algorithms:
      - id: mal_01
        title: "Çölyak hastalığı: tanı (biyopsisiz yol dahil) ve takip"
      - id: mal_02
        title: "Laktoz intoleransı (primer / sekonder / konjenital)"
      - id: mal_03
        title: "Konjenital sukraz-izomaltaz eksikliği: yaklaşım"
      - id: mal_04
        title: "İnce barsak bakteriyel aşırı çoğalması (SIBO)"
      - id: mal_05
        title: "Kısa barsak sendromu / intestinal yetmezlik: rehabilitasyon"
      - id: mal_06
        title: "Protein kaybettiren enteropati: tanısal akış"
      - id: mal_07
        title: "İntestinal lenfanjiektazi: tanı ve yönetim"
      - id: mal_08
        title: "Konjenital ishaller (MVID / tufting enteropati): yaklaşım"

  - id: cond_fonksiyonel
    name: "Fonksiyonel GİS Bozuklukları (Rome IV)"
    icon: "〰️"
    consensus: [rome4_infant, rome4_child, constipation_2014]
    algorithms:
      - id: fgid_01
        title: "İnfant regürjitasyonu: tanı ve aile danışmanlığı"
      - id: fgid_02
        title: "İnfant koliği: Rome IV tanısı ve yönetim"
      - id: fgid_03
        title: "Fonksiyonel kabızlık: disempaksiyon ve idame tedavisi"
      - id: fgid_04
        title: "Fonksiyonel karın ağrısı bozuklukları (FAP / IBS / abdominal migren)"
      - id: fgid_05
