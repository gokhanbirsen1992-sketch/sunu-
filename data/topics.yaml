        title: "Akut kusma: değerlendirme ve kırmızı bayraklar"
      - id: sx_14
        title: "Kronik / tekrarlayan kusma: ayırıcı tanı"
      - id: sx_15
        title: "Safralı kusma: obstrüksiyon değerlendirmesi"
      - id: sx_16
        title: "Regürjitasyon (infant): GÖR / GÖRH ayrımı"
      - id: sx_17
        title: "Hematemez: değerlendirme ve yönetim"
      - id: sx_18
        title: "Melena: üst / alt GİS kaynak ayrımı"
      - id: sx_19
        title: "Hematokezya / kanlı dışkı: yaşa göre ayırıcı"
      - id: sx_20
        title: "Akut ishal (<14 gün): değerlendirme"
      - id: sx_21
        title: "Kronik ishal (>4 hafta): yaşa göre tanısal akış"
      - id: sx_22
        title: "Kanlı ishal (dizanteri): ayırıcı ve HÜS değerlendirmesi"
      - id: sx_23
        title: "Yağlı dışkı / steatore: pankreatik / mukozal ayrım"
      - id: sx_24
        title: "Akut kabızlık: değerlendirme"
      - id: sx_25
        title: "Kronik kabızlık / fekal impaksiyon: yaklaşım"
      - id: sx_26
        title: "Enkoprezis (dışkı kaçırma): değerlendirme ve yönetim"
      - id: sx_27
        title: "Mukuslu dışkı: ayırıcı"
      - id: sx_28
        title: "Tenesmus / defekasyon ağrısı: ayırıcı"
      - id: sx_29
        title: "Perianal akıntı / apse / fistül: yaklaşım"
      - id: sx_30
        title: "Rektal prolapsus: ayırıcı ve yönetim"
      - id: sx_31
        title: "Kilo kaybı / yetersiz kilo alımı: değerlendirme"
      - id: sx_32
        title: "Büyüme geriliği (FTT): GİS odaklı değerlendirme"
      - id: sx_33
