  - id: rome4_child
    cite: "Hyams JS ve ark. Functional Disorders: Children and Adolescents. Gastroenterology 2016"
    doi: "10.1053/j.gastro.2016.02.015"
  - id: rome4_infant
    cite: "Zeevenhooven J ve ark. The New Rome IV Criteria for FGID in Infants and Toddlers. 2017"
    doi: "10.5223/pghn.2017.20.1.1"
  - id: gerd_2018
    cite: "Rosen R ve ark. Pediatric GER Clinical Practice Guidelines — NASPGHAN-ESPGHAN. JPGN 2018"
    doi: "10.1097/MPG.0000000000001889"
  - id: eatef
