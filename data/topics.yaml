    doi: "10.1016/j.waojou.2024.100888"
  - id: ibd_porto
    cite: "Levine A ve ark. ESPGHAN Revised Porto Criteria — IBD diagnosis in children. JPGN 2014"
    doi: "10.1097/MPG.0000000000000239"
  - id: cd_eccoespghan
    cite: "van Rheenen PF ve ark. Medical Management of Paediatric Crohn's Disease — ECCO-ESPGHAN Update. JCC 2020"
    doi: "10.1093/ecco-jcc/jjaa161"
  - id: uc_eccoespghan_1
    cite: "Turner D ve ark. Management of Paediatric UC Part 1: Ambulatory Care — ECCO-ESPGHAN. JPGN 2018"
    doi: "10.1097/MPG.0000000000002035"
  - id: uc_eccoespghan_2
    cite: "Turner D ve ark. Management of Paediatric UC Part 2: Acute Severe Colitis — ECCO-ESPGHAN. JPGN 2018"
    doi: "10.1097/MPG.0000000000002036"
  - id: cholestasis_2017
    cite: "Fawaz R ve ark. Guideline — Evaluation of Cholestatic Jaundice in Infants — NASPGHAN-ESPGHAN. JPGN 2017"
