# =============================================================================
# EKSEN 1 — BULGU / ŞİKAYET TEMELLİ ALGORİTMALAR
# "Hasta ... bulgusu / şikayeti ile geliyor" → tanısal yaklaşım
# =============================================================================
presentations:

  - id: pres_lab
    name: "Laboratuvar Bulguları"
    icon: "🧪"
    consensus: [cholestasis_2017, nafld_naspghan, palf_naspghan]
    algorithms:
      - id: lab_01
        title: "AST / ALT yüksekliği (çocuk–adölesan): hepatik / kas / sistemik ayrımı"
      - id: lab_02
        title: "İnfant izole ALT yüksekliği (<1 yaş): yaklaşım"
      - id: lab_03
        title: "İzole AST yüksekliği: kas–karaciğer ayrımı ve makro-AST"
      - id: lab_04
        title: "İzole ALP yüksekliği: kemik mi karaciğer mi (yaşa göre)"
      - id: lab_05
        title: "GGT yüksekliği: kolestaz değerlendirmesi"
      - id: lab_06
        title: "Konjuge (direkt) hiperbilirubinemi: tanısal akış"
      - id: lab_07
        title: "Unkonjuge (indirekt) hiperbilirubinemi: tanısal akış"
      - id: lab_08
        title: "Hipoalbuminemi: sentez bozukluğu / protein kaybı ayrımı"
      - id: lab_09
        title: "Uzamış INR / koagülopati: K vitamini yanıtı değerlendirmesi"
      - id: lab_10
        title: "Hiperamonyemi: acil değerlendirme ve ayırıcı"
      - id: lab_11
        title: "Düşük seruloplazmin: Wilson hastalığı taraması"
      - id: lab_12
        title: "AFP (alfa-fetoprotein) yüksekliği: yaşa göre yorum"
      - id: lab_13
        title: "Amilaz / lipaz yüksekliği: pankreatit değerlendirmesi"
      - id: lab_14
        title: "Hiperamilazemi (non-pankreatik) ve makroamilazemi"
      - id: lab_15
        title: "Yüksek fekal kalprotektin: IBD taraması"
      - id: lab_16
        title: "Demir eksikliği anemisi / okült GİS kanama taraması"
      - id: lab_17
        title: "Fekal elastaz-1 düşüklüğü: ekzokrin pankreas yetmezliği"
      - id: lab_18
        title: "Pozitif çölyak serolojisi: sonraki adım"
      - id: lab_19
        title: "Eozinofili + GİS bulguları: allerjik / otoimmün ayırıcı"
      - id: lab_20
        title: "Trombositopeni + karaciğer: hipersplenizm / portal hipertansiyon"

  - id: pres_goruntuleme
    name: "Görüntüleme & Muayene Bulguları"
    icon: "🩻"
    consensus: [choledocho_asge, cholestasis_2017]
    algorithms:
      - id: img_01
        title: "Safra taşı (insidental / semptomatik): yaklaşım"
      - id: img_02
        title: "Safra çamuru (biliary sludge): değerlendirme"
      - id: img_03
        title: "Safra kesesi hidropsu: ayırıcı ve yönetim"
      - id: img_04
        title: "Safra kesesi polipi: izlem kararı"
      - id: img_05
        title: "Koledok (CBD) dilatasyonu: tanısal akış"
      - id: img_06
        title: "Hepatomegali: ayırıcı tanı"
      - id: img_07
        title: "İzole splenomegali: ayırıcı tanı"
      - id: img_08
        title: "Hepatosplenomegali: ayırıcı tanı"
      - id: img_09
        title: "Karaciğer kitlesi: benign / malign ayrımı"
      - id: img_10
        title: "Pankreas kitlesi / kistik lezyon: yaklaşım"
      - id: img_11
        title: "Asit (yeni başlangıç): değerlendirme"
      - id: img_12
        title: "Palpabl karın kitlesi: yaşa göre ayırıcı"
      - id: img_13
        title: "İnsidental hepatik steatoz / fokal lezyon: yaklaşım"

  - id: pres_semptom
    name: "Semptomlar"
    icon: "🤚"
    consensus: [age_espghan, constipation_2014, rome4_infant, rome4_child, cholestasis_2017]
    algorithms:
      - id: sx_01
        title: "Akut sarılık (büyük çocuk): yaklaşım"
      - id: sx_02
        title: "Akolik (beyaz / kil renkli) dışkı: değerlendirme"
      - id: sx_03
        title: "Koyu idrar (bilirubinüri / hemoglobinüri): ayırıcı"
      - id: sx_04
        title: "Kolestatik kaşıntı: yaklaşım ve semptomatik tedavi"
      - id: sx_05
        title: "Sağ üst kadran ağrısı: ayırıcı tanı"
      - id: sx_06
        title: "Epigastrik ağrı: ayırıcı tanı"
      - id: sx_07
        title: "Sırta vuran ağrı: pankreatit paterni değerlendirmesi"
      - id: sx_08
        title: "Sağ alt kadran ağrısı: apandisit ayırıcısı"
      - id: sx_09
        title: "Kronik / tekrarlayan karın ağrısı: Rome IV çerçevesi"
      - id: sx_10
        title: "Karın distansiyonu: ayırıcı tanı"
      - id: sx_11
        title: "Disfaji (yutma güçlüğü): yaşa göre yaklaşım"
      - id: sx_12
        title: "Odinofaji (ağrılı yutma): ayırıcı"
