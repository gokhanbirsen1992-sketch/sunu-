# =============================================================================
# Pediatrik Gastroenteroloji — Literatür Temelli Algoritma Projesi
# BAŞLIK TASLAĞI (Taxonomy / Kapsam Tanımı)  —  v2
# =============================================================================
#
# DURUM: TASLAK — kullanıcı onayı / düzeltmesi bekleniyor.
#
# Bu taslak, GÜNCEL PEDİATRİK GE KONSENSÜS REHBERLERİNE dayanılarak,
# yüklenen referans uygulamadan TAMAMEN BAĞIMSIZ olarak hazırlanmıştır.
# Aşağıdaki rehberlerin künyeleri PubMed üzerinden doğrulanmıştır (bkz.
# key_consensus_sources). Her algoritma ileride kendi PubMed'e çözümlenmiş
# kaynak listesini (PMID/DOI) alacaktır.
#
# YAPI:
#   domains[]            → klinik alan (rehber bazlı gruplama)
#     consensus[]        → o alanı yöneten konsensüs rehber(ler)i
#     algorithms[]       → o alanda üretilecek karar/yönetim algoritmaları
#
# NASIL DÜZENLENİR:
#   - İstemediğin algoritmayı sil; başlığı değiştir; yeni başlık ekle (id benzersiz)
#   - Alan (domain) adlarını, gruplamayı serbestçe değiştir
#   - Eksik bulduğun konsensüs rehberini key_consensus_sources'a ekle
#
# TASLAK TOPLAMI: 11 alan, 68 algoritma
# =============================================================================

project: "Pediatrik GE — Literatür Temelli Algoritmalar"
schema_version: 2
status: taslak

# --- Doğrulanmış konsensüs kaynakları (PubMed) -------------------------------
# Künyeler PubMed get_article_metadata ile doğrulandı. DOI = https://doi.org/<doi>
