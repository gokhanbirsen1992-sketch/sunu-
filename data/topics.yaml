# =============================================================================
# Pediatrik Gastroenteroloji — Literatür Temelli Algoritma Projesi
# BAŞLIK LİSTESİ (Taxonomy / Kapsam Tanımı)
# =============================================================================
#
# Bu dosya, üretilecek klinik algoritmaların KAPSAMINI tanımlar.
# Yapılan başlık seçimi, yüklenen referans uygulamadan aday havuz olarak
# türetilmiştir; içerik sıfırdan, PubMed'e çözümlenmiş kaynaklarla üretilecektir.
#
# Her başlık ileride şunları alacak:
#   - Klinik içerik (tanım, patogenez, tanı, ayırıcı, tedavi, tuzaklar, takip)
#   - Mermaid akış şeması (karar algoritması)
#   - kaynaklar: her biri gerçek makaleye (PMID / DOI) çözümlenmiş literatür
#
# NASIL DÜZENLENİR:
#   - Kapsam dışı bırakmak istediğin başlığı sil ya da 'include: false' ekle
#   - Yeni başlık eklemek için aynı formatta bir entry ekle (id benzersiz olmalı)
#   - Modül / kategori adlarını serbestçe değiştirebilirsin
#
# ADAY HAVUZ TOPLAMI: 404 hastalık + 197 şikayet = 601 başlık, 6 modül
# Üretim tarihi: 2026-05-14
# =============================================================================

