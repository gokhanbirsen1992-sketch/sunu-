      - id: sx_34
        title: "Kolay morarma / kanama eğilimi: karaciğer kaynaklı ayrım"
      - id: sx_35
        title: "Rekürren hipoglisemi: metabolik karaciğer şüphesi"
      - id: sx_36
        title: "Yenidoğan kusması: cerrahi / medikal ayrım"
      - id: sx_37
        title: "Mekonyum pasajı gecikmesi (>24–48 saat): yaklaşım"
      - id: sx_38
        title: "İştahsızlık / beslenme reddi (infant): değerlendirme"

  - id: pres_acil
    name: "Acil Prezentasyonlar"
    icon: "🚨"
    consensus: [palf_naspghan, battery_2021]
    algorithms:
      - id: em_01
        title: "Akut karın / akut batın: triyaj ve değerlendirme"
      - id: em_02
        title: "GİS kanama: hemodinamik instabil hasta yönetimi"
      - id: em_03
        title: "Pediatrik akut karaciğer yetmezliği: erken tanıma ve sevk"
      - id: em_04
        title: "Hepatik ensefalopati: tanı ve acil yönetim"
      - id: em_05
        title: "Yabancı cisim / düğme pil yutma: acil yönetim"
      - id: em_06
        title: "Koroziv madde alımı: akut yaklaşım"
      - id: em_07
