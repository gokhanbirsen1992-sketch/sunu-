      - id: be_10
        title: "Beslenme sırasında huzursuzluk / ağlama: ayırıcı"
      - id: be_11
        title: "Tüpten orale geçiş güçlüğü: yaklaşım"
      - id: be_12
        title: "Pika (yenilemez madde yeme): değerlendirme"

  - id: semptom_bebek
    name: "Bebek (0–12 ay) Spesifik Şikayetler"
    icon: "🍼"
    consensus: [rome4_infant, dracma, gerd_2018]
    algorithms:
