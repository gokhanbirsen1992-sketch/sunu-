      - id: si_11
        title: "Tekrarlayan enfeksiyon + GİS: immün yetmezlik şüphesi"
      - id: si_12
        title: "Çomak parmak (clubbing): kronik GİS-KC hastalığı ayırıcısı"
      - id: si_13
        title: "Rekürren hipoglisemi: metabolik karaciğer hastalığı şüphesi"

  - id: semptom_tup
