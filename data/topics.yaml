    algorithms:
      - id: is_01
        title: "Akut ishal (<14 gün): değerlendirme ve dehidratasyon"
      - id: is_02
        title: "Persistan ishal (14 gün – 4 hafta): yaklaşım"
      - id: is_03
        title: "Kronik ishal (>4 hafta): yaşa göre tanisal akış"
      - id: is_04
        title: "Kanlı ishal (dizanteri): ayırıcı ve HÜS değerlendirmesi"
      - id: is_05
        title: "Sulu / sekretuar ishal (büyük hacim): ayırıcı"
      - id: is_06
        title: "Yağlı dışkı / steatore: malabsorpsiyon değerlendirmesi"
      - id: is_07
        title: "Mukuslu dışkı: ayırıcı"
      - id: is_08
        title: "Gece ishali: organik hastalık göstergesi değerlendirmesi"
      - id: is_09
        title: "Yenidoğan ishali: konjenital ishal ayırıcısı"
      - id: is_10
        title: "Antibiyotik ilişkili ishal: değerlendirme"
      - id: is_11
        title: "Gıda ile tetiklenen ishal / intolerans şüphesi: yaklaşım"

  - id: semptom_kabizlik
    name: "Kabızlık & Defekasyon Şikayetleri"
    icon: "🚽"
    consensus: [constipation_2014]
    algorithms:
      - id: ka_01
        title: "Akut kabızlık: değerlendirme"
      - id: ka_02
        title: "Kronik kabızlık: organik / fonksiyonel ayrım"
      - id: ka_03
        title: "Fekal impaksiyon: tanı ve disempaksiyon"
      - id: ka_04
        title: "Enkoprezis / dışkı kaçırma (soiling): değerlendirme"
      - id: ka_05
        title: "Mekonyum pasajı gecikmesi (>24–48 saat): yaklaşım"
      - id: ka_06
        title: "Tuvalet tutma davranışı (withholding): yaklaşım"
      - id: ka_07
        title: "Ağrılı defekasyon / dişezi: ayırıcı"
      - id: ka_08
        title: "Tenesmus: ayırıcı tanı"
      - id: ka_09
        title: "İnkomplet boşalma hissi: değerlendirme"
      - id: ka_10
        title: "Dışkı kıvamı / kalınlığı değişikliği: yaklaşım"

  - id: semptom_kanama
    name: "GİS Kanama Şikayetleri"
    icon: "🩸"
    consensus: []
    algorithms:
      - id: kn_01
        title: "Hematemez: değerlendirme ve yönetim"
      - id: kn_02
        title: "Melena: üst / alt GİS kaynak ayrımı"
      - id: kn_03
        title: "Hematokezya (parlak kırmızı kan): yaşa göre ayırıcı"
      - id: kn_04
        title: "Rektoraji (anal kaynaklı kanama): yaklaşım"
      - id: kn_05
        title: "Currant jelly stool: invajinasyon değerlendirmesi"
      - id: kn_06
        title: "Gaitada gizli kan pozitifliği: değerlendirme"
      - id: kn_07
        title: "Tuvalet kâğıdında / dışkı yüzeyinde kan: anal patoloji ayrımı"

  - id: semptom_anorektal
    name: "Anorektal Şikayetler"
    icon: "🎯"
    consensus: [cd_eccoespghan]
    algorithms:
      - id: an_01
        title: "Anal ağrı: ayırıcı tanı"
      - id: an_02
        title: "Anal kaşıntı (pruritus ani): ayırıcı"
      - id: an_03
        title: "Anal fissür: tanı ve yönetim"
      - id: an_04
        title: "Perianal akıntı / apse / fistül: yaklaşım"
      - id: an_05
        title: "Rektal prolapsus: ayırıcı ve yönetim"
      - id: an_06
        title: "Perianal cilt tagi / döküntü: değerlendirme"
      - id: an_07
        title: "Anüste kitle / şişlik: ayırıcı"

  - id: semptom_sarilik
