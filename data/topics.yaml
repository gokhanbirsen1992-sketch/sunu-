# =============================================================================
# EKSEN 1 — BULGU / ŞİKAYET TEMELLİ ALGORİTMALAR
# "Hasta ... şikayeti / bulgusu ile geliyor" → tanısal yaklaşım
# =============================================================================
presentations:

  - id: semptom_oral
    name: "Ağız, Yutma & Özofagus Şikayetleri"
    icon: "👄"
    consensus: [gerd_2018, eoe_espghan]
    algorithms:
      - id: or_01
        title: "Disfaji (yutma güçlüğü): yaşa göre ayırıcı ve tanısal akış"
      - id: or_02
        title: "Odinofaji (ağrılı yutma): ayırıcı tanı"
      - id: or_03
        title: "Globus hissi (boğazda yumru hissi): yaklaşım"
      - id: or_04
        title: "Halitozis (ağız kokusu): GİS kaynaklı ayırıcı"
      - id: or_05
        title: "Aşırı salya / sialore: değerlendirme"
      - id: or_06
        title: "Tekrarlayan oral aft / ülser: sistemik hastalık taraması"
      - id: or_07
        title: "Ağız kuruluğu: ayırıcı tanı"
      - id: or_08
        title: "Lokma ilerletme / çiğneme güçlüğü: değerlendirme"
      - id: or_09
        title: "Beslenmede öğürme / boğulma: aspirasyon riski değerlendirmesi"
      - id: or_10
        title: "Retrosternal yanma (heartburn): GÖRH değerlendirmesi"
      - id: or_11
        title: "Retrosternal / göğüs ağrısı: GİS kaynaklı ayırıcı"
      - id: or_12
        title: "Water brash (ağza ekşi su gelmesi): yaklaşım"
      - id: or_13
        title: "İnatçı hıçkırık (>48 saat): ayırıcı ve yaklaşım"
      - id: or_14
        title: "Aşırı geğirme / aerofaji: değerlendirme"
      - id: or_15
        title: "Sandifer postürü / distonik hareketler: GÖRH ayrımı"

  - id: semptom_kusma
    name: "Bulantı & Kusma"
    icon: "🤮"
    consensus: [gerd_2018, rome4_infant, rome4_child]
    algorithms:
      - id: ku_01
        title: "Akut kusma: değerlendirme ve kırmızı bayraklar"
      - id: ku_02
        title: "Kronik / tekrarlayan kusma: ayırıcı tanı"
      - id: ku_03
        title: "Siklik kusma (ataklar hâlinde): değerlendirme"
      - id: ku_04
        title: "Safralı (yeşil) kusma: obstrüksiyon değerlendirmesi"
      - id: ku_05
        title: "Kanlı kusma / hematemez: değerlendirme"
      - id: ku_06
        title: "Projektil kusma: pilor stenozu ve ayırıcı"
      - id: ku_07
        title: "Sabah kusması: kafa içi basınç / metabolik ayırıcı"
      - id: ku_08
        title: "Beslenme sonrası kusma / regürjitasyon: GÖR ayrımı"
      - id: ku_09
        title: "İzole bulantı (kusmasız): yaklaşım"
      - id: ku_10
        title: "Yenidoğan kusması: cerrahi / medikal ayrım"
      - id: ku_11
        title: "Ruminasyon (geri getirip çiğneme): tanı ve yaklaşım"

  - id: semptom_agri
    name: "Karın Ağrısı"
    icon: "💢"
    consensus: [rome4_child, rome4_infant]
    algorithms:
      - id: ag_01
        title: "Akut karın ağrısı: triyaj ve değerlendirme"
      - id: ag_02
        title: "Kronik / tekrarlayan karın ağrısı: Rome IV çerçevesi"
      - id: ag_03
        title: "Epigastrik ağrı: ayırıcı tanı"
      - id: ag_04
        title: "Periumbilikal ağrı: ayırıcı tanı"
      - id: ag_05
        title: "Sağ üst kadran ağrısı: ayırıcı tanı"
      - id: ag_06
        title: "Sağ alt kadran ağrısı: apandisit ayırıcısı"
      - id: ag_07
        title: "Sol taraflı / yaygın karın ağrısı: ayırıcı"
      - id: ag_08
        title: "Sırta vuran ağrı: pankreatit paterni değerlendirmesi"
      - id: ag_09
        title: "Gece uyandıran karın ağrısı: organik hastalık taraması"
      - id: ag_10
        title: "Yemekle tetiklenen (postprandial) ağrı: ayırıcı"
      - id: ag_11
        title: "Defekasyonla ilişkili karın ağrısı: ayırıcı"
      - id: ag_12
        title: "İnfant kolik ağrısı / aşırı ağlama: Rome IV ayrımı"

  - id: semptom_distansiyon
    name: "Şişkinlik, Gaz, Distansiyon & Kitle"
    icon: "🎈"
    consensus: []
    algorithms:
      - id: di_01
        title: "Karın distansiyonu: ayırıcı tanı"
      - id: di_02
        title: "Aşırı gaz / şişkinlik: FODMAP / malabsorpsiyon ayırıcısı"
      - id: di_03
        title: "Palpabl karın kitlesi: yaşa göre ayırıcı"
      - id: di_04
        title: "Görünür peristaltizm: obstrüksiyon değerlendirmesi"
      - id: di_05
        title: "Borborigmi / aşırı barsak sesi: yaklaşım"

  - id: semptom_ishal
    name: "İshal & Malabsorpsiyon Şikayetleri"
    icon: "💧"
