name: Windows .exe build

on:
  workflow_dispatch:
  push:
    branches: [claude/clever-dijkstra-3ofeeg]
    paths:
      - "desktop/**"
      - "sav2q1/**"
      - ".github/workflows/windows-build.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop/requirements.txt pyinstaller

      - name: .exe derle (PyInstaller)
        run: >
          pyinstaller --noconfirm --onefile --windowed --name MakaleUretici
          --paths .
          --collect-submodules sav2q1
          --collect-all pyreadstat
          --collect-all statsmodels
          --collect-all pingouin
          --collect-all scikit_posthocs
          --collect-all factor_analyzer
          --collect-all scipy
          --collect-data docx
          desktop/app.py

      - name: Artefakt olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: MakaleUretici-windows
          path: dist/MakaleUretici.exe
          if-no-files-found: error

      - name: Release oluştur (indirilebilir link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: win-v${{ github.run_number }}
          name: SPSS → Makale Üretici — Windows (build ${{ github.run_number }})
          body: |
            Çift-tıkla çalışan Windows programı. Kurulum/Python gerekmez.
            `MakaleUretici.exe`'yi indirin → çalıştırın → .sav seçin → Word üretilir.
          files: dist/MakaleUretici.exe
          fail_on_unmatched_files: true
